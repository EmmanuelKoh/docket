<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio · DOCKET</title>
<link rel="stylesheet" href="/docket.css">
<script>
  (function () {
    if (localStorage.getItem('docket-theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
<style>
  /* studio-specific layout on top of the DOCKET system (docket.css) */
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }

  .toolbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 26px;
    border-bottom: 0.5px solid var(--border);
    background: var(--raised);
  }
  .toolbar select {
    background: var(--page); color: var(--ink);
    border: 0.5px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font-family: var(--font-mono); font-size: 12px;
    cursor: pointer; min-width: 160px; outline: none;
  }
  .toolbar select:focus { border-color: var(--ink-faint); }
  .toolbar .hint { color: var(--ink-faint); font-size: 12px; }
  .spacer { flex: 1; }

  .main {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0;
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }

  .editors {
    display: flex; flex-direction: column; min-height: 0;
    border-right: 0.5px solid var(--border); background: var(--raised);
  }
  .tabs { display: flex; border-bottom: 0.5px solid var(--hairline); }
  .tabs button {
    background: transparent; color: var(--ink-faint); border: 0;
    border-bottom: 1.5px solid transparent;
    font-family: var(--font-sans); font-size: 12px; padding: 8px 14px; cursor: pointer;
  }
  .tabs button.active { color: var(--ink); border-bottom-color: var(--red); }
  .editor-wrap { flex: 1; position: relative; min-height: 0; display: flex; flex-direction: column; }
  textarea {
    flex: 1; resize: none; border: 0; outline: 0; padding: 14px;
    background: var(--raised); color: var(--ink); font-family: var(--font-mono);
    font-size: 12.5px; line-height: 1.55; tab-size: 2;
    display: block; width: 100%;
  }
  textarea.hidden { display: none; }
  .error-bar {
    color: var(--red); font-size: 12px; padding: 4px 14px; display: none;
    border-top: 0.5px solid var(--hairline);
  }
  .error-bar.show { display: block; }

  .stage { background: var(--page); display: flex; flex-direction: column; min-height: 0; }
  .stagebar {
    display: flex; align-items: center; gap: 10px; padding: 10px 26px;
    border-bottom: 0.5px solid var(--hairline);
    color: var(--ink-muted); font-size: 12px; font-family: var(--font-mono);
  }
  .stagedot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .stagedot.active { background: var(--ink); }
  .stagedot.error { background: var(--red); }
  .scroll { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 28px 16px 60px; }
  .roll {
    background: #ffffff; border: 0.5px solid var(--border);
    position: relative; width: 576px; flex-shrink: 0; height: fit-content;
  }
  .roll img { display: block; width: 100%; image-rendering: pixelated; }
  .empty-msg { color: var(--ink-faint); font-size: 12px; padding: 40px 20px; text-align: center; }

  .jobs-panel {
    border-top: 0.5px solid var(--border); background: var(--raised);
    max-height: 180px; overflow-y: auto;
  }
  .jobs-header {
    padding: 8px 26px; border-bottom: 0.5px solid var(--hairline);
    position: sticky; top: 0; background: var(--raised);
  }
  .job-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 26px; font-size: 12px; font-family: var(--font-mono);
    border-bottom: 0.5px solid var(--hairline);
  }
  .job-row:last-child { border-bottom: none; }
  .job-thumb {
    width: 32px; height: auto; image-rendering: pixelated;
    border: 0.5px solid var(--border); border-radius: 2px; background: #fff; flex-shrink: 0;
  }
  .job-id { color: var(--ink); min-width: 56px; }
  .job-size { color: var(--ink-faint); }
  .job-status { min-width: 60px; color: var(--ink-muted); }
  .job-status.queued { color: var(--ink-muted); }
  .job-status.inflight, .job-status.failed { color: var(--red); }
  .job-status.done { color: var(--ink-faint); }
  .job-time { color: var(--ink-faint); margin-left: auto; }

  .toast {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--raised); color: var(--ink);
    border: 0.5px solid var(--border); border-radius: 6px;
    padding: 8px 16px; font-size: 12px; z-index: 100;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.35); z-index: 50;
    display: none; align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--raised); border: 0.5px solid var(--border); border-radius: 6px;
    padding: 20px; width: 320px;
  }
  .modal h3 { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
  .modal input {
    width: 100%; background: var(--page); color: var(--ink);
    border: 0.5px solid var(--border); border-radius: 6px;
    padding: 8px 10px; font-family: var(--font-mono); font-size: 12px; outline: none;
  }
  .modal input:focus { border-color: var(--ink-faint); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
</style>
</head>
<body>

<header class="header">
  <a class="wordmark" href="/dashboard">DOCKET</a>
  <nav class="nav">
    <a href="/dashboard">Home</a>
    <a href="/dashboard/templates" class="active">Templates</a>
    <a href="/dashboard/plugins">Plugins</a>
    <a href="/dashboard/queue">Queue</a>
    <a href="/dashboard/history">History</a>
    <button class="icon-btn" id="theme-toggle" title="Theme" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <a class="icon-btn" href="/logout" title="Sign out" aria-label="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </a>
  </nav>
</header>

<div class="toolbar">
  <select id="templateSelect"></select>
  <button class="btn small" id="btnNew">New</button>
  <button class="btn small" id="btnSave">Save</button>
  <button class="btn small" id="btnDelete">Delete</button>
  <div class="spacer"></div>
  <button class="btn small" id="btnPrint">Print</button>
  <span class="hint" id="shortcutHint">Ctrl+S save · Ctrl+P print</span>
</div>

<div class="main">
  <div class="editors">
    <div class="tabs">
      <button class="active" data-tab="template">Template</button>
      <button data-tab="data">Data (JSON)</button>
    </div>
    <div class="editor-wrap">
      <textarea id="editorTemplate" spellcheck="false" placeholder="Liquid + HTML template..."></textarea>
      <textarea id="editorData" class="hidden" spellcheck="false" placeholder='{"key": "value"}'></textarea>
      <div class="error-bar" id="errorBar"></div>
    </div>
  </div>
  <div class="stage">
    <div class="stagebar">
      <span class="stagedot" id="dot"></span>
      <span id="status">ready</span>
    </div>
    <div class="scroll">
      <div class="roll" id="roll">
        <div class="empty-msg" id="emptyMsg">Select a template or start typing to see a preview</div>
      </div>
    </div>
    <div class="jobs-panel">
      <div class="jobs-header"><span class="label">Recent jobs</span></div>
      <div class="jobs-list" id="jobsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">New template</h3>
    <input id="modalInput" placeholder="Template name" autocomplete="off">
    <div class="modal-actions">
      <button class="btn small" id="modalCancel">Cancel</button>
      <button class="btn small" id="modalOk">Create</button>
    </div>
  </div>
</div>

<script>
// ---- theme toggle (shared behavior with the dashboard) ----
document.getElementById('theme-toggle').addEventListener('click', function () {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (dark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('docket-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('docket-theme', 'dark');
  }
});

// ---- state ----
let templates = [];
let currentName = '';
let previewTimer = null;
let abortCtrl = null;
let trackingJobId = null; // job we're watching for status updates

const editorTemplate = document.getElementById('editorTemplate');
const editorData = document.getElementById('editorData');
const errorBar = document.getElementById('errorBar');
const templateSelect = document.getElementById('templateSelect');
const roll = document.getElementById('roll');
const emptyMsg = document.getElementById('emptyMsg');
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');
const toast = document.getElementById('toast');
const jobsList = document.getElementById('jobsList');

// ---- tabs ----
document.querySelector('.tabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tab = btn.dataset.tab;
  editorTemplate.classList.toggle('hidden', tab !== 'template');
  editorData.classList.toggle('hidden', tab !== 'data');
});

// ---- tab key in textareas ----
[editorTemplate, editorData].forEach(ta => {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 2;
      ta.dispatchEvent(new Event('input'));
    }
  });
});

// ---- toast ----
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ---- template selector ----
function populateSelect(nameToSelect) {
  templateSelect.innerHTML = '';
  templates.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = t.name;
    templateSelect.appendChild(opt);
  });
  if (nameToSelect && templates.some(t => t.name === nameToSelect)) {
    templateSelect.value = nameToSelect;
  }
  loadTemplate(templateSelect.value);
}

templateSelect.addEventListener('change', () => loadTemplate(templateSelect.value));

function loadTemplate(name) {
  const t = templates.find(x => x.name === name);
  if (!t) return;
  currentName = name;
  editorTemplate.value = t.template || '';
  editorData.value = typeof t.data === 'string' ? t.data : JSON.stringify(t.data, null, 2);
  errorBar.classList.remove('show');
  schedulePreview();
}

// ---- data validation ----
function parseData() {
  const raw = editorData.value.trim();
  if (!raw) { errorBar.classList.remove('show'); return {}; }
  try {
    const d = JSON.parse(raw);
    errorBar.classList.remove('show');
    return d;
  } catch (err) {
    errorBar.textContent = 'JSON: ' + err.message;
    errorBar.classList.add('show');
    return null;
  }
}

// ---- preview ----
function setStatus(state, text) {
  dot.className = 'stagedot' + (state ? ' ' + state : '');
  statusEl.textContent = text;
}

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 400);
}

async function renderPreview() {
  const tpl = editorTemplate.value;
  if (!tpl.trim()) {
    setStatus('', 'ready');
    roll.querySelectorAll('img').forEach(img => img.remove());
    emptyMsg.style.display = '';
    return;
  }

  const data = parseData();
  if (data === null) {
    setStatus('error', 'fix JSON to preview');
    return;
  }

  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();

  setStatus('', 'rendering...');

  try {
    const resp = await fetch('/preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template: tpl, data }),
      signal: abortCtrl.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'render failed' }));
      setStatus('error', err.error || 'render failed');
      return;
    }

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const w = resp.headers.get('X-Image-Width') || 576;
    const h = resp.headers.get('X-Image-Height') || 100;

    roll.querySelectorAll('img').forEach(img => { URL.revokeObjectURL(img.src); img.remove(); });
    emptyMsg.style.display = 'none';
    const img = document.createElement('img');
    img.src = url;
    img.width = +w;
    img.height = +h;
    roll.appendChild(img);

    setStatus('active', w + ' x ' + h + 'px — 1-bit');
  } catch (err) {
    if (err.name === 'AbortError') return;
    setStatus('error', err.message);
  }
}

editorTemplate.addEventListener('input', schedulePreview);
editorData.addEventListener('input', schedulePreview);

// ---- scale the roll to fit ----
function scaleRoll() {
  const avail = roll.parentElement.clientWidth - 32;
  const scale = Math.min(1, avail / 576);
  roll.style.transform = 'scale(' + scale + ')';
  roll.style.transformOrigin = 'top center';
}
window.addEventListener('resize', scaleRoll);

// ---- template API ----
async function fetchTemplates() {
  try {
    const resp = await fetch('/templates');
    templates = await resp.json();
  } catch {
    templates = [];
  }
}

async function apiSave(name, template, data) {
  const resp = await fetch('/templates', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, template, data }),
  });
  const body = await resp.json();
  if (resp.status === 403 && body.readOnly) {
    showToast('Saving is not enabled on the hosted version yet.');
    return null;
  }
  if (!resp.ok) {
    showToast(body.error || 'Save failed');
    return null;
  }
  return body;
}

async function apiDelete(name) {
  const resp = await fetch('/templates?name=' + encodeURIComponent(name), { method: 'DELETE' });
  const body = await resp.json();
  if (resp.status === 403 && body.readOnly) {
    showToast('Deleting is not enabled on the hosted version yet.');
    return null;
  }
  if (!resp.ok) {
    showToast(body.error || 'Delete failed');
    return null;
  }
  return body;
}

// ---- button handlers ----
document.getElementById('btnSave').addEventListener('click', async () => {
  if (!currentName) return showToast('No template selected');
  const data = parseData();
  if (data === null) return showToast('Fix JSON before saving');
  const result = await apiSave(currentName, editorTemplate.value, data);
  if (result) {
    templates = result;
    populateSelect(currentName);
    showToast('Saved "' + currentName + '"');
  }
});

document.getElementById('btnDelete').addEventListener('click', async () => {
  if (!currentName) return;
  if (!confirm('Delete "' + currentName + '"?')) return;
  const result = await apiDelete(currentName);
  if (result) {
    templates = result;
    currentName = templates.length ? templates[0].name : '';
    populateSelect(currentName);
    showToast('Deleted');
  }
});

// ---- new template modal ----
const modalBg = document.getElementById('modalBg');
const modalInput = document.getElementById('modalInput');

function openNewModal() {
  modalInput.value = '';
  modalBg.classList.add('show');
  setTimeout(() => modalInput.focus(), 50);
}

document.getElementById('btnNew').addEventListener('click', openNewModal);

document.getElementById('modalCancel').addEventListener('click', () => {
  modalBg.classList.remove('show');
});

modalBg.addEventListener('click', e => {
  if (e.target === modalBg) modalBg.classList.remove('show');
});

async function createTemplate() {
  const name = modalInput.value.trim();
  if (!name) return;
  modalBg.classList.remove('show');
  const defaultTpl = '<div style="display:flex;flex-direction:column;width:576px;font-family:Sans;background:#fff;color:#000;padding:24px">\n  <div style="display:flex;font-size:30px;font-weight:700">{{ title }}</div>\n</div>';
  const defaultData = { title: name };
  const result = await apiSave(name, defaultTpl, defaultData);
  if (result) {
    templates = result;
    populateSelect(name);
    showToast('Created "' + name + '"');
  }
}

document.getElementById('modalOk').addEventListener('click', createTemplate);
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') createTemplate();
  if (e.key === 'Escape') modalBg.classList.remove('show');
});

// ---- print (via job queue) ----
document.getElementById('btnPrint').addEventListener('click', async () => {
  const tpl = editorTemplate.value.trim();
  if (!tpl) return showToast('Nothing to print');
  const data = parseData();
  if (data === null) return showToast('Fix JSON before printing');

  const btn = document.getElementById('btnPrint');
  btn.disabled = true;
  btn.textContent = 'Queuing...';

  try {
    const resp = await fetch('/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template: tpl, data, name: currentName || 'untitled', source: 'studio' }),
    });
    const body = await resp.json();
    if (resp.ok) {
      trackingJobId = body.id;
      showToast('Queued ' + body.id + ' — ' + body.width + 'x' + body.height + 'px');
      refreshJobs();
    } else {
      showToast(body.error || 'Queue failed');
    }
  } catch (err) {
    showToast('Queue failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Print';
  }
});

// ---- recent jobs panel ----
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 5) return 'now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

async function refreshJobs() {
  try {
    const resp = await fetch('/jobs?limit=10');
    const jobs = await resp.json();
    renderJobsList(jobs);

    // Track the job we just printed — notify when it transitions
    if (trackingJobId) {
      const tracked = jobs.find(j => j.id === trackingJobId);
      if (tracked && tracked.status === 'done') {
        showToast(trackingJobId + ' printed');
        trackingJobId = null;
      } else if (tracked && tracked.status === 'failed') {
        showToast(trackingJobId + ' failed');
        trackingJobId = null;
      }
    }
  } catch {
    // server down, ignore
  }
}

function renderJobsList(jobs) {
  if (!jobs.length) {
    jobsList.innerHTML = '<div class="job-row" style="color:var(--ink-faint)">No jobs yet — hit Print to queue one</div>';
    return;
  }
  jobsList.innerHTML = jobs.map(j => `
    <div class="job-row">
      <img class="job-thumb" src="/jobs?png=${j.id}" loading="lazy" alt="">
      <span class="job-id">${j.id}</span>
      <span class="job-size">${j.width}x${j.height}</span>
      <span class="job-status ${j.status}">${j.status === 'inflight' ? 'printing' : j.status}</span>
      <span class="job-time">${timeAgo(j.createdAt)}</span>
    </div>
  `).join('');
}

// Poll jobs every 3s to pick up status changes from the printer agent.
setInterval(refreshJobs, 3000);

// ---- keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('btnSave').click();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
    e.preventDefault();
    document.getElementById('btnPrint').click();
  }
});

// detect Mac for hint
if (navigator.platform.startsWith('Mac') || navigator.userAgent.includes('Mac')) {
  document.getElementById('shortcutHint').textContent = '⌘S save · ⌘P print';
}

// ---- boot ----
// /studio?template=Name opens that template; /studio?new=1 opens the
// new-template modal (both used by the dashboard's Templates section).
(async () => {
  const params = new URLSearchParams(location.search);
  await fetchTemplates();
  const wanted = params.get('template');
  populateSelect(wanted && templates.some(t => t.name === wanted)
    ? wanted
    : (templates.length ? templates[0].name : ''));
  scaleRoll();
  refreshJobs();
  if (params.get('new')) openNewModal();
})();
</script>
</body>
</html>
